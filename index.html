<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Ad to Earn</title>
    <!-- Adsgram Official SDK -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .loader {
            font-size: 20px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader">🔄 Loading Video Ad...</div>
        <div style="font-size: 14px; color: #aaaaaa;">Please wait a moment</div>
    </div>

    <script>
        // Parse Block ID from URL Parameters
        const urlParams = new URLSearchParams(window.location.search);
        let parsedBlockId = urlParams.get('blockId') || '36654';
        
        // Ensure the Block ID is strictly handled as a String to prevent Adsgram errors
        const blockIdStr = String(parsedBlockId).trim();

        // Initialize Adsgram Controller
        const AdController = window.Adsgram.init({ blockId: blockIdStr });

        // Auto-play Ad immediately upon loading
        AdController.show().then((result) => {
            alert("🎯 Ad completed successfully! Your reward has been processed.");
            window.location.reload();
        }).catch((result) => {
            alert("⚠️ Ad skipped or no ads available at this moment. Please try again.");
            console.log("Adsgram Error Status:", result);
        });
    </script>
</body>
</html>
